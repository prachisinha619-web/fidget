<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Spinner</title>
        <style>
            *{
                margin: 0px;
                padding: 0px;
                box-sizing: border-box;
            }
            body {
                background-color:#0b1571;
                height: 100vh;
                width: 100vw;
                display: grid;
                place-content: center;
            }
            
            div {
                background-color: #fff;
                padding: 50px;
                width: 350px;
                text-align: center;
                border-radius: 20px;
            }
            @keyframes rotate {
                0%{
                    transform: rotate(0deg);
                }
                100%{
                    transform: rotate(360deg);
                }
            }
            img{
                width: 250px;
                margin-bottom: 50px;
            }

            .active {
                animation: rotate 0.4s linear infinite;
            }
            button {
                padding: 15px;
                width: 60%;
                background:green;
                font-size: 20px;
                color: white;
            }
            
        </style>
    </head>
    </body>
        <div>
            <img id="spinner" src="fidget.jpeg" alt="">
            <br>
            <button id="btn" onclick="control()">START</button>
           <script>
    let spinner = document.getElementById('spinner');
    let btn = document.getElementById('btn');
    const audio = new Audio('sound.mp3');
    let status = false;

    function control() {
        if (status == false) {
            spinner.classList.add('active');
            audio.play();
            btn.innerHTML = "STOP";
            status = true;
        } else {
            spinner.classList.remove('active');
            audio.pause();
            audio.currentTime = 0;
            btn.innerHTML = "START";
            status = false;
        }
    }
           </script> 
        </div>
    </html>
